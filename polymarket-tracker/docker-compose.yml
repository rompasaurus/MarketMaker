services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polymarket_tracker
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=polymarket_tracker;Username=polymarket;Password=${POSTGRES_PASSWORD:-devpassword}"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
    ports:
      - "5000:5000"
    volumes:
      - backend-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SIGNALR_URL: /hubs/market
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend-logs:
